<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>เข้าสู่ระบบนักเรียน</title>
<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --text-main: #4b5563;
        --bg-grad: linear-gradient(135deg, #dbeafe 0%, #93c5fd 40%, #60a5fa 70%, #3b82f6 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Itim', sans-serif; }
    html, body { height: 100%; width: 100%; overflow: hidden; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }
    body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg-grad); position: relative; }
    
    /* Background Animals */
    .animal-bg { position: absolute; pointer-events: none; z-index: 1; animation: floatAnimal 6s infinite ease-in-out; filter: drop-shadow(0 4px 8px rgba(0,0,0,.15)); }
    @media (max-width: 768px){ .animal-bg { opacity: 0.18 !important; } }
    @keyframes floatAnimal { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }

    /* Login Card */
    .card { position: relative; z-index: 10; width: 420px; padding: 40px 35px; background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 30px; text-align: center; border: 2px dashed var(--primary); box-shadow: 0 15px 35px rgba(37, 99, 235, 0.1); }
    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }

    .logo { font-size: 65px; margin-bottom: 5px; }
    h1 { color: var(--primary); margin-bottom: 8px; font-size: 2rem; }
    .subtitle { color: var(--text-main); margin-bottom: 30px; font-size: 1.1rem; }
    .input-group { display: flex; justify-content: center; gap: 14px; margin: 25px 0; }
    
    .digit { width: 60px; height: 70px; border: 2px solid transparent; border-radius: 18px; font-size: 36px; text-align: center; background: #ffffff; box-shadow: 0 6px 12px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
    .digit:focus { outline: none; border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15), 0 12px 20px rgba(37, 99, 235, 0.1); }

    button { margin-top: 15px; border: none; border-radius: 50px; padding: 14px 45px; font-size: 22px; cursor: pointer; background: linear-gradient(135deg, #3b82f6, var(--primary-dark)); color: white; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3); transition: all 0.3s ease; }
    button:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 12px 24px rgba(37, 99, 235, 0.4); }
    button:active:not(:disabled) { transform: scale(0.95); }
    button:disabled { background: #cbd5e1; color: #94a3b8; box-shadow: none; cursor: not-allowed; transform: none; }

    #msg { margin-top: 20px; font-size: 18px; color: var(--text-main); min-height: 27px; }
    .loading { color: var(--primary); display: inline-block; animation: pulse 0.8s infinite alternate; }
    @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.05); opacity: 1; } }
    .footer { margin-top: 25px; color: #6b7280; font-size: 15px; }

    @media (max-width: 480px) {
        .card { width: 90%; padding: 30px 20px; }
        h1 { font-size: 1.7rem; }
        .digit { width: 55px; height: 65px; font-size: 32px; border-radius: 14px; }
        button { width: 100%; padding: 12px 30px; }
    }
</style>
</head>
<body>

<div id="animal-container"></div>

<div class="card">
    <div class="logo">🎓</div>
    <h1>เข้าสู่ระบบนักเรียน</h1>
    <div class="subtitle">กรุณากรอกเลขนักเรียน 4 หลัก</div>

    <form id="loginForm">
        <div class="input-group">
            <input type="tel" class="digit" maxlength="1" inputmode="numeric" aria-label="หลักที่ 1">
            <input type="tel" class="digit" maxlength="1" inputmode="numeric" aria-label="หลักที่ 2">
            <input type="tel" class="digit" maxlength="1" inputmode="numeric" aria-label="หลักที่ 3">
            <input type="tel" class="digit" maxlength="1" inputmode="numeric" aria-label="หลักที่ 4">
        </div>
        <button type="submit" id="submitBtn">🚀 เข้าสู่ระบบ</button>
    </form>
    <p id="msg"></p>
    <div class="footer">🌈 ยินดีต้อนรับนักเรียนทุกคน 🌈</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx1-M1YBoMw1LeTG_vT32aS8NzVTLMICLb5sMKGtton-tdApCGzG22V52k4c20HWpe4/exec";
const digits = document.querySelectorAll(".digit");
const card = document.querySelector(".card");
const submitBtn = document.getElementById("submitBtn");
const msgEl = document.getElementById("msg");

// สุ่มไอคอนสัตว์พื้นหลัง
(function createRandomAnimals() {
    const container = document.getElementById('animal-container');
    const animals = ['🐟','🐠','🐡','🐙','🦀','🫧'].sort(() => Math.random() - 0.5);
    animals.forEach((animal, i) => {
        const span = document.createElement('span');
        span.className = 'animal-bg';
        span.innerText = animal;
        const angle = (i / animals.length) * Math.PI * 2;
        span.style.left = `${50 + Math.cos(angle) * 38}%`;
        span.style.top = `${50 + Math.sin(angle) * 38}%`;
        span.style.fontSize = `${[45, 55, 65, 75, 85][Math.floor(Math.random() * 5)]}px`;
        span.style.opacity = 0.7;
        span.style.animationDuration = `${5 + Math.random() * 3}s`;
        span.style.animationDelay = `${Math.random() * -5}s`;
        container.appendChild(span);
    });
})();

function triggerShake() {
    card.classList.remove("shake");
    void card.offsetWidth;
    card.classList.add("shake");
}

document.getElementById("loginForm").addEventListener("submit", e => { e.preventDefault(); login(); });

// จัดการการพิมพ์ในช่อง Input
digits.forEach((input, index) => {
    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, '');
        if (input.value && index < digits.length - 1) digits[index + 1].focus();
    });

    input.addEventListener("keydown", e => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            digits[index - 1].value = "";
            digits[index - 1].focus();
            e.preventDefault();
        }
        if (e.key === "ArrowLeft" && index > 0) digits[index - 1].focus();
        if (e.key === "ArrowRight" && index < digits.length - 1) digits[index + 1].focus();
    });

    input.addEventListener("paste", e => {
        e.preventDefault();
        const cleanNumbers = (e.clipboardData || window.clipboardData).getData("text").replace(/[^0-9]/g, '').slice(0, 4);
        cleanNumbers.split("").forEach((num, idx) => { if (digits[idx]) digits[idx].value = num; });
        if (cleanNumbers.length) digits[Math.min(cleanNumbers.length - 1, 3)].focus();
        if (cleanNumbers.length === 4) login();
    });
});

async function login() {
    const studentNo = [...digits].map(x => x.value).join("");
    if (studentNo.length !== 4) {
        msgEl.innerHTML = "⚠️ กรอกเลขนักเรียนให้ครบ 4 หลัก";
        return triggerShake();
    }

    submitBtn.disabled = true;
    msgEl.innerHTML = "<span class='loading'>🔍 กำลังตรวจสอบข้อมูล...</span>";

    try {
        const response = await fetch(`${API_URL}?studentNo=${studentNo}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();

        if (data.found) {
            ['sheetName', 'studentNo', 'studentName', 'row'].forEach(key => sessionStorage.setItem(key, data[key]));
            msgEl.innerHTML = "✅ พบข้อมูล กำลังเข้าสู่ระบบ...";
            setTimeout(() => { location.href = "main.html"; }, 1000);
        } else {
            msgEl.innerHTML = "❌ ไม่พบเลขนักเรียนนี้";
            submitBtn.disabled = false;
            triggerShake();
        }
    } catch (error) {
        console.error(error);
        msgEl.innerHTML = "❌ เกิดข้อผิดพลาดในการเชื่อมต่อ";
        submitBtn.disabled = false;
        triggerShake();
    }
}
digits[0].focus();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>สมุดบันทึกคะแนน</title>
<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --bg-grad: linear-gradient(135deg, #dbeafe 0%, #93c5fd 40%, #60a5fa 70%, #3b82f6 100%);
        --success: #10b981;
        --danger-light: #ffebe6;
        --danger-border: #fca5a5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Itim', sans-serif; }
    html, body { width: 100%; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }
    body { min-height: 100vh; padding: 15px; background: var(--bg-grad); position: relative; overflow-x: hidden; }

    /* การ์ตูนลอยพื้นหลัง */
    .animal-bg { position: absolute; pointer-events: none; z-index: 1; animation: floatAnimal 6s infinite ease-in-out; filter: drop-shadow(0 4px 8px rgba(0,0,0,.15)); }
    @media (max-width: 768px){ .animal-bg { opacity: 0.15 !important; } }
    @keyframes floatAnimal { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }

    .container { position: relative; z-index: 10; max-width: 900px; margin: auto; }
    
    /* กล่องโปรไฟล์ */
    .profile-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; padding: 15px 20px; margin-bottom: 15px; border: 1px solid white; box-shadow: 0 8px 24px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; gap: 15px; }
    .profile-left { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 50px; height: 50px; object-fit: contain; }
    .student-name { font-size: 1.3rem; color: var(--primary-dark); }
    .rank-badge { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; font-size: 0.9rem; padding: 2px 10px; border-radius: 50px; margin-top: 2px; display: inline-block; }
    
    /* ส่วนหลอดพลัง */
    .progress-box { width: 45%; max-width: 300px; }
    .progress-text { display: flex; justify-content: space-between; font-size: 0.95rem; color: #374151; margin-bottom: 4px; }
    .progress-bar { width: 100%; height: 10px; background: #e2e8f0; border-radius: 50px; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #10b981, #34d399); border-radius: 50px; transition: width 0.8s ease-out; }

    /* ปุ่มกลับหน้าหลัก */
    .back-btn { border: none; background: #ffffff; color: var(--primary-dark); padding: 6px 14px; border-radius: 50px; font-size: 0.95rem; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    
    /* โซนแสดงคะแนน */
    .score-zone { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; border: 1px solid white; }
    .zone-title { color: var(--primary-dark); font-size: 1.3rem; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

    /* Grid */
    .score-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
    
    /* การ์ดกิจกรรม */
    .item-card { border-radius: 14px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; position: relative; min-height: 85px; box-shadow: 0 2px 6px rgba(0,0,0,0.02); border: 1px solid transparent; transition: transform 0.2s; }
    .item-card:hover { transform: translateY(-2px); }
    
    .item-card.has-score { background: #ffffff; border-color: #e2e8f0; }
    .item-card.no-score { background: var(--danger-light); border-color: var(--danger-border); }

    .item-title { font-size: 1rem; color: #1e293b; font-weight: bold; margin-bottom: 8px; padding-right: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    
    .score-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; margin-top: auto; padding-top: 4px; border-top: 1px dashed rgba(0,0,0,0.05); }
    .score-label { color: #64748b; }
    .score-num { font-size: 1.1rem; font-weight: bold; }
    .has-score .score-num { color: var(--success); }
    .no-score .score-num { color: #ef4444; font-size: 0.95rem; font-weight: normal; }

    .pin-icon { position: absolute; top: 6px; right: 6px; font-size: 0.9rem; }

    /* Skeleton โหลด */
    .skeleton { height: 85px; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 400% 100%; border-radius: 14px; animation: loading 1.5s infinite; }
    @keyframes loading { from { background-position: 100% 0; } to { background-position: -100% 0; } }
    .empty-text { grid-column: 1/-1; text-align: center; color: #64748b; padding: 20px 0; }

    @media (max-width: 600px) {
        .profile-panel { flex-direction: column; align-items: flex-start; padding: 12px; gap: 10px; }
        .progress-box { width: 100%; max-width: none; }
        .score-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .zone-title { flex-direction: column; align-items: flex-start; gap: 8px; }
        .back-btn { width: 100%; text-align: center; }
    }
</style>
</head>
<body>

<div id="animal-container"></div>

<div class="container">
    <div class="profile-panel">
        <div class="profile-left">
            <img id="avatarImg" class="avatar" src="img/boy.png" alt="นร.">
            <div>
                <h1 class="student-name" id="nameLabel">กำลังโหลด...</h1>
                <div id="rankLabel" class="rank-badge">คำนวณฉายา...</div>
            </div>
        </div>
        
        <div class="progress-box">
            <div class="progress-text">
                <span>🐳 ความคืบหน้า</span>
                <strong id="percentLabel">0%</strong>
            </div>
            <div class="progress-bar">
                <div id="barFill" class="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="score-zone">
        <div class="zone-title">
            <h2>🏆 คะแนนของฉัน</h2>
            <button class="back-btn" onclick="location.href='main.html'">↩️ กลับหน้าภารกิจ</button>
        </div>
        <div id="scoreGrid" class="score-grid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </div>
</div>

<script>
(() => {
    const API_URL = "https://script.google.com/macros/s/AKfycbx1-M1YBoMw1LeTG_vT32aS8NzVTLMICLb5sMKGtton-tdApCGzG22V52k4c20HWpe4/exec";

    const sheetName = sessionStorage.getItem("sheetName") || localStorage.getItem("sheetName");
    const studentName = sessionStorage.getItem("studentName") || localStorage.getItem("studentName");
    const row = sessionStorage.getItem("row") || localStorage.getItem("row");

    // แก้ไขจุดบกพร่องข้อที่ 4: สั่งให้หยุดรันทันทีเมื่อย้ายหน้า
    if (!sheetName || !studentName || !row) {
        location.href = "index.html";
        return;
    }

    // แก้ไขจุดบกพร่องข้อที่ 1: แยก Cache Key ตามห้องและลำดับแถวป้องกันข้อมูลปนกัน
    const CACHE_KEY = `cachedActivities_${sheetName}_${row}`;

    // ตั้งค่าเบื้องต้น
    document.getElementById("nameLabel").textContent = studentName;
    if (/(เด็กหญิง|ด\.หญิง|ด\.ญ\.)/.test(studentName)) {
        document.getElementById("avatarImg").src = "img/girl.png";
    }

    // ฟังก์ชันความปลอดภัย (แก้ไขจุดบกพร่องข้อที่ 2: ป้องกัน XSS)
    function escapeHTML(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[m]));
    }

    // สร้างการ์ตูนสัตว์ลอยพื้นหลัง
    (function initBackgroundAnimals() {
        const container = document.getElementById('animal-container');
        const animals = ['🐟','🐠','🐡','🐙','🦀','🫧'].sort(() => Math.random() - 0.5);
        animals.forEach((animal, i) => {
            const span = document.createElement('span');
            span.className = 'animal-bg'; span.innerText = animal;
            const angle = (i / animals.length) * Math.PI * 2;
            span.style.left = `${50 + Math.cos(angle) * 40}%`; span.style.top = `${50 + Math.sin(angle) * 45}%`;
            span.style.fontSize = `${[30, 40, 50][Math.floor(Math.random() * 3)]}px`;
            span.style.opacity = 0.3; // ปรับลงเล็กน้อยไม่ให้กวนสายตา
            span.style.animationDuration = `${6 + Math.random() * 3}s`;
            container.appendChild(span);
        });
    })();

    function updateProgress(passed, total) {
        if (total === 0) {
            document.getElementById("percentLabel").textContent = "0% (0/0)";
            document.getElementById("barFill").style.width = "0%";
            document.getElementById("rankLabel").textContent = "📭 ไม่มีภารกิจ";
            return;
        }
        const rate = Math.round((passed / total) * 100);
        document.getElementById("percentLabel").textContent = `${rate}% (${passed}/${total})`;
        document.getElementById("barFill").style.width = `${rate}%`;

        let title = "🥚 แพลงก์ตอนน้อย";
        if (rate >= 100) title = "🔱 เจ้าสมุทรไร้พ่าย";
        else if (rate >= 75) title = "🦈 ฉลามจอมพลัง";
        else if (rate >= 40) title = "🐡 ปักเป้าซุกซน";
        else if (rate > 0) title = "🐠 ปลานีโม่น้อย";
        document.getElementById("rankLabel").textContent = title;
    }

    function renderScores(activities) {
        const grid = document.getElementById("scoreGrid");
        
        // แก้ไขจุดบกพร่องข้อที่ 3: หากไม่มีกิจกรรม ให้คำนวณ Progress เป็น 0 ก่อนยุติฟังก์ชัน
        if (!activities || !activities.length) {
            grid.innerHTML = `<div class="empty-text">📭 ยังไม่มีข้อมูลกิจกรรม</div>`;
            updateProgress(0, 0);
            return;
        }

        let passedCount = 0;
        const cardsHTML = activities.map(item => {
            const hasScore = item.hasScore === true;
            let cardClass = "no-score";
            let scoreDisplay = "ยังไม่ทำ";
            let pinHTML = `<span class="pin-icon">📌</span>`;

            if (hasScore) {
                passedCount++;
                cardClass = "has-score";
                scoreDisplay = item.score !== undefined && item.score !== "" ? `${escapeHTML(item.score)} คะแนน` : "ผ่านแล้ว";
                pinHTML = "";
            }

            return `
                <div class="item-card ${cardClass}">
                    ${pinHTML}
                    <div class="item-title">${escapeHTML(item.activity)}</div>
                    <div class="score-row">
                        <span class="score-num">${scoreDisplay}</span>
                    </div>
                </div>
            `;
        }).join("");

        grid.innerHTML = cardsHTML;
        updateProgress(passedCount, activities.length);
    }

    async function loadScores() {
        // ใช้ CACHE_KEY ใหม่ที่ปลอดภัย
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
            try { renderScores(JSON.parse(cached)); } catch(e) { console.error(e); }
        }

        try {
            const res = await fetch(`${API_URL}?action=activities&sheet=${encodeURIComponent(sheetName)}&row=${encodeURIComponent(row)}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (data && data.activities) {
                localStorage.setItem(CACHE_KEY, JSON.stringify(data.activities));
                renderScores(data.activities);
            }
        } catch(e) {
            console.error(e);
            if (!localStorage.getItem(CACHE_KEY)) {
                document.getElementById("scoreGrid").innerHTML = `<div class="empty-text">❌ ไม่สามารถเชื่อมต่อข้อมูลได้</div>`;
            }
        }
    }

    loadScores();
})();
</script>
</body>
</html>

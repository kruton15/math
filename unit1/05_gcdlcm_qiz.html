<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>ปริศนา ห.ร.ม. & ค.ร.น.</title>
<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-light: #eff6ff;
  --success: #10b981;
  --danger: #ef4444;
  --bg-grad: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 40%, #7dd3fc 70%, #38bdf8 100%);
  --panel: rgba(255, 255, 255, 0.95);
  --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 10px 15px -3px rgba(37, 99, 235, 0.1);
  --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
}

* { 
  margin: 0; padding: 0; box-sizing: border-box; 
  font-family: 'Itim', sans-serif; -webkit-tap-highlight-color: transparent;
}

body { 
  min-height: 100vh; width: 100%; background: var(--bg-grad); 
  padding: 12px; display: flex; justify-content: center; align-items: center;
}

#bg-decorations { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
.decor-item { position: absolute; animation: floatEffect 6s infinite ease-in-out; filter: drop-shadow(0 6px 12px rgba(0,0,0,.1)); opacity: 0.6; }
@keyframes floatEffect { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }

.container { 
  position: relative; z-index: 10; width: 100%; max-width: 700px; margin: 0 auto;
  padding: clamp(16px, 4vw, 32px); background: var(--panel); backdrop-filter: blur(20px); 
  border-radius: 24px; border: 3px dashed var(--primary); box-shadow: var(--shadow-lg); 
  display: flex; flex-direction: column; gap: 14px;
}

.logo { font-size: clamp(55px, 11vw, 75px); text-align: center; }
h1 { text-align: center; color: var(--primary); font-size: clamp(1.8rem, 4.5vw, 2.5rem); font-weight: bold; line-height: 1.2; }
h2 { color: var(--primary-dark); font-size: clamp(1.2rem, 3vw, 1.6rem); text-align: center; }
.subtitle { color: #4b5563; font-size: clamp(0.95rem, 2.2vw, 1.15rem); text-align: center; line-height: 1.6; }

.top-bar { 
  display: flex; justify-content: space-between; align-items: center; font-weight: 600; 
  font-size: 16px; background: rgba(255,255,255,0.8); padding: 12px 20px; border-radius: 16px; 
  color: #1e3a8a; box-shadow: var(--shadow-sm);
}

.q-panel { 
  padding: 22px; border-radius: 24px; border: 2px solid #dbeafe; background: #fff;
  box-shadow: 0 8px 18px rgba(0,0,0,.08); font-size: clamp(1.05rem, 2.5vw, 1.45rem);
  line-height: 1.9; color: #111827; text-align: left;
}
.q-panel b { color: var(--primary); }

.answer-input {
  width: 100%; height: 56px; border-radius: 16px; border: 2px solid #cbd5e1;
  font-size: 22px; text-align: center; color: var(--primary-dark); font-weight: bold; outline: none;
}
.answer-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }

.msg { text-align: center; min-height: 28px; font-size: clamp(1rem, 2.2vw, 1.15rem); font-weight: 600; }
.center { text-align: center; }
.big { font-size: clamp(60px, 13vw, 85px); margin-bottom: 12px; }

button.btn { 
  border: none; border-radius: 50px; padding: 14px 32px; font-size: clamp(16px, 3vw, 20px); 
  cursor: pointer; color: white; transition: all 0.2s ease; width: 100%; font-weight: bold; 
  display: inline-flex; justify-content: center; align-items: center; min-height: 52px;
}
button.btn:active { transform: scale(0.98); }
button.btn-start { background: linear-gradient(135deg, #3b82f6, var(--primary-dark)); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); width: auto; padding: 14px 55px; }
button.btn-back { background: linear-gradient(135deg, #94a3b8, #64748b); box-shadow: 0 5px 15px rgba(100, 116, 139, 0.2); width: auto; padding: 11px 45px; margin-top: 8px; }
button.btn-submit { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); border-radius: 18px; }

.modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); padding: 20px; }
.modal.show { display: flex; }
.modal-card { background: #fff; padding: 26px; border-radius: 26px; max-width: 500px; width: 100%; text-align: center; box-shadow: var(--shadow-lg); border: 3px solid var(--primary); max-height: 85vh; display: flex; flex-direction: column; gap: 12px; }
.modal-card h3 { color: var(--danger); font-size: clamp(1.4rem, 3.5vw, 1.75rem); font-weight: bold; }
#solution { font-size: clamp(1.1rem, 2.5vw, 1.25rem); color: #374151; line-height: 1.6; text-align: left; background: #f8fafc; padding: 18px; border-radius: 16px; overflow-y: auto; flex-grow: 1; border: 1px solid #e2e8f0; }

.shake { animation: shake 0.4s ease-in-out; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px); } 40%, 80% { transform: translateX(5px); } }
.footer { color: #6b7280; font-size: 14px; text-align: center; font-weight: bold; margin-top: 10px; }

@media (max-width: 768px){ 
  .decor-item { opacity: 0.12 !important; } 
  body { align-items: flex-start; }
}
</style>
</head>
<body>

<div id="bg-decorations"></div>

<div class="container" id="gameCard">
  <div id="startScreen" class="center">
    <h1>ปริศนา ห.ร.ม. & ค.ร.น.</h1>
    <div class="logo">📝</div>
    <p class="subtitle">ทดสอบความรู้การประยุกต์ใช้ ห.ร.ม. และ ค.ร.น.<br>แบบสุ่มตัวเลขจำนวน 5 ข้อ (ข้อละ 3 คะแนน) ⏱️<br>คิดให้รอบคอบก่อนส่งคำตอบนะเด็กๆ</p>
    <button class="btn btn-start" onclick="startGame()">🎮 เริ่มทำข้อสอบ</button><br>
    <button class="btn btn-back" onclick="goToMain()">📌 หน้าภารกิจ</button>
    <div class="footer">🌈 ฝึกคิด ฝึกคำนวณ พัฒนาสมอง 🌈</div>
  </div>

  <div id="gameScreen" style="display:none; flex-direction:column; gap:14px;">
    <div class="top-bar">
      <div id="progress">ข้อ 1/5</div>
      <div id="score">คะแนน: 0</div>
    </div>
    
    <div class="q-panel" id="questionText">กำลังโหลดโจทย์...</div>

    <div class="input-section">
      <input type="number" id="ansInput" class="answer-input" placeholder="พิมพ์คำตอบเฉพาะตัวเลขที่นี่" pattern="[0-9]*" inputmode="numeric">
    </div>
    
    <div class="msg" id="msg"></div>
    <button class="btn btn-submit" onclick="checkAnswer()">🚀 ส่งคำตอบ</button>
  </div>

  <div id="endScreen" class="center" style="display:none;"></div>
</div>

<div id="modal" class="modal">
 <div class="modal-card">
  <h3 id="modalTitle">💡 เฉลยวิธีคิดจ้า</h3>
  <div id="solution"></div>
  <button class="btn" style="background: linear-gradient(135deg, #3b82f6, var(--primary-dark));" onclick="closeModal()">รับทราบและไปต่อ! 🏃</button>
 </div>
</div>

<script>
const TOTAL_QS = 5, SCORE_PER_Q = 3; // ปรับกลับเป็นข้อละ 3 คะแนน รวมเป็นเต็ม 15 คะแนนอย่างสมบูรณ์
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1-M1YBoMw1LeTG_vT32aS8NzVTLMICLb5sMKGtton-tdApCGzG22V52k4c20HWpe4/exec";

const urlParams = new URLSearchParams(window.location.search);
const studentNo = urlParams.get('studentNo') || '', row = urlParams.get('row') || '', sheetName = urlParams.get('sheet') || '';

let score = 0, current = 0, questions = [], audioCtx = null, currentAnswer = 0, currentSolution = "";

const gcd = (a, b) => b ? gcd(b, a % b) : a;
const gcdArr = a => a.reduce(gcd);
const lcm = (a, b) => (a * b) / gcd(a, b);
const lcmArr = a => a.reduce(lcm);

(function createDecorations() {
    const container = document.getElementById('bg-decorations');
    ['🐟','🐠','🐡','🐙','🦀','🫧'].sort(() => Math.random() - 0.5).forEach((item, i, arr) => {
        const span = document.createElement('span');
        span.className = 'decor-item'; span.innerText = item;
        const angle = (i / arr.length) * Math.PI * 2;
        span.style.left = `${50 + Math.cos(angle) * 38}%`; span.style.top = `${50 + Math.sin(angle) * 38}%`;
        span.style.fontSize = `${[35, 45, 55, 65][Math.floor(Math.random() * 4)]}px`;
        span.style.animationDuration = `${5 + Math.random() * 3}s`;
        container.appendChild(span);
    });
})();

function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = type === "correct" ? 750 : (type === "wrong" ? 180 : (type === "win" ? 950 : 130));
    osc.start(); gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
    osc.stop(audioCtx.currentTime + 0.4);
}

document.getElementById("ansInput").addEventListener("keyup", e => { if (e.key === "Enter") checkAnswer(); });

function generateDynamicQuestions() {
    questions = [];
    
    // ข้อ 1: เชือกของพ่อ
    const hrmBase = [4, 5, 6][Math.floor(Math.random() * 3)];
    const mults1 = [[7, 9, 11], [8, 11, 13], [9, 11, 14], [6, 11, 13]][Math.floor(Math.random() * 4)];
    const q1_A = hrmBase * mults1[0], q1_B = hrmBase * mults1[1], q1_C = hrmBase * mults1[2];
    const q1_hrm = gcdArr([q1_A, q1_B, q1_C]), q1_ans = (q1_A + q1_B + q1_C) / q1_hrm;
    questions.push({
        text: `พ่อมีเชือกยาว <b>${q1_A}</b> เมตร, <b>${q1_B}</b> เมตร และ <b>${q1_C}</b> เมตร ถ้าพ่อต้องการตัดเชือกทุกเส้นโดยเชือกแต่ละเส้นมีความยาวเท่าๆ กันและไม่เหลือเศษ โดยให้ได้เชือกยาวที่สุด พ่อจะได้เชือกทั้งหมดรวมกันกี่เส้น`,
        ans: q1_ans,
        sol: `1. หา ห.ร.ม. ของ ${q1_A}, ${q1_B}, ${q1_C} ได้เท่ากับ <b>${q1_hrm}</b> เมตร<br>2. คำนวณจำนวนเส้นเชือก:<br>• เส้นแรก: ${q1_A} ÷ ${q1_hrm} = ${q1_A/q1_hrm} เส้น<br>• เส้นสอง: ${q1_B} ÷ ${q1_hrm} = ${q1_B/q1_hrm} เส้น<br>• เส้นสาม: ${q1_C} ÷ ${q1_hrm} = ${q1_C/q1_hrm} เส้น<br><b>รวมทั้งหมดได้:</b> <span style='color:var(--success)'><b>${q1_ans} เส้น</b></span>`
    });

    // ข้อ 2: คุกกี้ของสินี
    const q2_hrmBase = [5, 10, 15][Math.floor(Math.random() * 3)];
    const mults2 = [[3, 4, 5], [4, 5, 6], [3, 5, 7]][Math.floor(Math.random() * 3)];
    const q2_A = q2_hrmBase * mults2[0], q2_B = q2_hrmBase * mults2[1], q2_C = q2_hrmBase * mults2[2];
    const q2_hrm = gcdArr([q2_A, q2_B, q2_C]), j_nom = q2_A / q2_hrm, j_noey = q2_B / q2_hrm, j_choc = q2_C / q2_hrm, q2_ans = (j_noey + j_choc) - j_nom;
    questions.push({
        text: `สินีมีคุกกี้รสนมสด <b>${q2_A}</b> ชิ้น คุกกี้รสเนย <b>${q2_B}</b> ชิ้น และคุกกี้รสช็อกโกแลต <b>${q2_C}</b> ชิ้น สินีต้องการจัดใส่จาน จานละเท่าๆ กัน โดยไม่คละรสและให้แต่ละจานมีจำนวนคุกกี้มากที่สุด จานคุกกี้รสเนยและรสช็อกโกแลตรวมกัน มีมากกว่าจานคุกกี้รสนมสดกี่จาน`,
        ans: q2_ans,
        sol: `1. หา ห.ร.ม. ได้เท่ากับ <b>${q2_hrm}</b> ชิ้น<br>2. จำนวนจานแต่ละรส: นมสด ${j_nom} จาน, เนย ${j_noey} จาน, ช็อกโกแลต ${j_choc} จาน<br>3. (รสเนย + ช็อกโกแลต) - นมสด = (${j_noey} + ${j_choc}) - ${j_nom} = <span style='color:var(--success)'><b>${q2_ans} จาน</b></span>`
    });

    // ข้อ 3: เวลาปล่อยเรือ
    const q3_sets = [[10, 15, 30], [10, 20, 30], [12, 15, 20], [15, 20, 30]][Math.floor(Math.random() * 4)];
    const q3_lcm = lcmArr(q3_sets), totalMinutes = q3_lcm * 3; 
    questions.push({
        text: `ท่าเรือปล่อยเรือออกจากท่า ดังนี้ เรือธงเขียวออกทุก <b>${q3_sets[0]}</b> นาที เรือธงเหลืองออกทุก <b>${q3_sets[1]}</b> นาที เรือธงส้มออกทุก <b>${q3_sets[2]}</b> นาที ถ้าเรือทั้ง 3 ประเภท ออกจากท่าพร้อมกันครั้งแรกเวลา 06.00 น. **นับจากครั้งแรก ต้องใช้เวลาผ่านไปอีกกี่นาที** เรือทั้ง 3 ประเภทจึงจะออกจากท่าพร้อมกันเป็นครั้งที่ 4 (ถัดจากครั้งแรกอีก 3 ครั้ง)`,
        ans: totalMinutes,
        sol: `1. หา ค.ร.น. ของ [ ${q3_sets.join(", ")} ] ได้เท่ากับ <b>${q3_lcm}</b> นาที<br>2. ถัดจากครั้งแรกไปอีก 3 ครั้ง ต้องใช้เวลาผ่านไป = 3 × ${q3_lcm} = <span style='color:var(--success)'><b>${totalMinutes} นาที</b></span>`
    });

    // ข้อ 4: ซื้ออาหารทะเล
    const q4_sets = [[20, 30, 40], [15, 20, 30], [10, 15, 25], [12, 18, 24]][Math.floor(Math.random() * 4)];
    const q4_lcm = lcmArr(q4_sets), kg_A = q4_lcm / q4_sets[0], kg_B = q4_lcm / q4_sets[1], kg_C = q4_lcm / q4_sets[2], q4_ans = kg_A + kg_B + kg_C;
    questions.push({
        text: `ปลา กุ้ง และหมึกราคากิโลกรัมละ <b>${q4_sets[0]}</b> บาท, <b>${q4_sets[1]}</b> บาท และ <b>${q4_sets[2]}</b> บาท ตามลำดับ ถ้าต้องการซื้ออาหารทะเลทุกชนิด โดยจ่ายเงินซื้อแต่ละชนิดเท่าๆ กันและจ่ายเงินน้อยที่สุด จะได้อาหารทะเลรวมกันทั้งหมดกี่กิโลกรัม`,
        ans: q4_ans,
        sol: `1. หา ค.ร.น. ของราคา ได้เท่ากับ <b>${q4_lcm} บาท</b><br>2. คำนวณน้ำหนัก: ปลา ${kg_A} กก., กุ้ง ${kg_B} กก., หมึก ${kg_C} กก.<br><b>รวมน้ำหนักทั้งหมด:</b> <span style='color:var(--success)'><b>${q4_ans} กิโลกรัม</b></span>`
    });

    // ข้อ 5: จัดหนังสือใส่กล่อง
    const q5_sets = [[6, 8, 12], [8, 10, 12], [4, 6, 10], [6, 9, 15]][Math.floor(Math.random() * 4)];
    const q5_lcm = lcmArr(q5_sets), limit = q5_lcm + 40;
    const box_A = q5_lcm / q5_sets[0], box_B = q5_lcm / q5_sets[1], box_C = q5_lcm / q5_sets[2], q5_ans = box_A + box_B + box_C;
    questions.push({
        text: `เก่งจัดหนังสือใส่กล่อง กล่องละ <b>${q5_sets[0]}</b> เล่ม, แก้วจัดกล่องละ <b>${q5_sets[1]}</b> เล่ม, และก้านจัดกล่องละ <b>${q5_sets[2]}</b> เล่ม ทั้ง 3 คนมีหนังสือเท่าๆ กัน แต่ไม่เกินคนละ <b>${limit}</b> เล่ม ถ้าทุกคนจัดหนังสือของตนเองใส่กล่องทั้งหมด พวกเขาจะต้องใช้กล่องรวมกันทั้งหมดกี่ใบ`,
        ans: q5_ans,
        sol: `1. หา ค.ร.น. ของจำนวนเล่ม ได้เท่ากับ <b>${q5_lcm}</b> เล่ม<br>2. คำนวณจำนวนกล่อง: เก่ง ${box_A} ใบ, แก้ว ${box_B} ใบ, ก้าน ${box_C} ใบ<br><b>รวมจำนวนกล่องทั้งหมด:</b> <span style='color:var(--success)'><b>${q5_ans} ใบ</b></span>`
    });
}

function startGame() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "flex";
    score = 0; current = 0;
    generateDynamicQuestions();
    loadQuestion();
}

function loadQuestion() {
    const msgEl = document.getElementById("msg");
    msgEl.textContent = ""; msgEl.style.color = "var(--danger)";
    document.getElementById("ansInput").value = "";
    document.getElementById("progress").textContent = `ข้อ ${current + 1}/${TOTAL_QS}`;
    document.getElementById("score").textContent = `คะแนน: ${score}`;
    
    const q = questions[current];
    document.getElementById("questionText").innerHTML = q.text;
    currentAnswer = q.ans; currentSolution = q.sol;
    document.getElementById("ansInput").focus();
}

function checkAnswer() {
    const userInput = document.getElementById("ansInput").value.trim();
    const msgEl = document.getElementById("msg");
    
    if (!userInput || isNaN(parseInt(userInput))) {
        msgEl.textContent = "⚠️ กรุณากรอกเฉพาะตัวเลขจำนวนเต็มเท่านั้นจ้า!";
        return;
    }

    if (parseInt(userInput) === currentAnswer) {
        playSound("correct");
        score += SCORE_PER_Q;
        document.getElementById("score").textContent = `คะแนน: ${score}`;
        msgEl.style.color = "var(--success)";
        msgEl.textContent = "🎉 ถูกต้องแล้วจ้า เก่งมาก!";
        setTimeout(nextQuestion, 1200);
    } else {
        playSound("wrong");
        msgEl.textContent = "❌ คำตอบยังไม่ถูกต้องน้า";
        const panel = document.getElementById("gameCard");
        panel.classList.remove('shake'); void panel.offsetWidth; panel.classList.add('shake');
        setTimeout(showModalSolution, 600);
    }
}

function showModalSolution() {
    document.getElementById("solution").innerHTML = currentSolution;
    document.getElementById("modal").classList.add("show");
}

function closeModal() {
    document.getElementById("modal").classList.remove("show");
    nextQuestion();
}

function nextQuestion() {
    current++;
    if (current >= TOTAL_QS) endGame(); else loadQuestion();
}

function endGame() {
    playSound("win");
    document.getElementById("gameScreen").style.display = "none";
    const end = document.getElementById("endScreen"); 
    end.style.display = "block";
    
    const isSavable = score > 0;
    let htmlContent = `
        <div class="big">🏆</div>
        <h1>ทำภารกิจครบถ้วน!</h1>
        <h2>คุณได้คะแนนรวม ทั้งหมด ${score}/${TOTAL_QS * SCORE_PER_Q} คะแนน</h2>
    `;
    
    htmlContent += isSavable 
        ? `<p id="saveStatus" class="subtitle" style="margin-top:10px; color: #1d4ed8; font-weight:bold;">💾 กำลังบันทึกผลงานลงระบบ Google Sheet...</p>`
        : `<p class="subtitle" style="margin-top:10px; color: var(--danger); font-weight:bold;">⚠️ คะแนนเป็น 0 จะไม่ถูกบันทึกลงระบบนะจ๊ะ ลองพยายามใหม่อีกครั้ง!</p>`;
    
    htmlContent += `
        <button class="btn btn-start" id="retryBtn" onclick="location.reload()" ${isSavable ? 'disabled' : ''}>♻️ ทำใหม่อีกครั้ง</button>
        <button class="btn btn-back" onclick="goToMain()">📌 หน้าภารกิจ</button>
    `;
    
    end.innerHTML = htmlContent;
    if (isSavable) saveScoreToGoogleSheet();
}

async function saveScoreToGoogleSheet() {
    const statusText = document.getElementById("saveStatus");
    const retryBtn = document.getElementById("retryBtn");
    
    if (!studentNo || !row || !sheetName) {
        statusText.innerHTML = "⚠️ ไม่พบข้อมูลนักเรียน (ไม่สามารถบันทึกคะแนน)";
        statusText.style.color = "#ef4444"; retryBtn.disabled = false; return;
    }
    
    try {
        await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "saveScore", studentNo, row: parseInt(row), col: 7, sheet: sheetName, score })
        });
        statusText.innerHTML = "✅ บันทึกผลงานลง Google Sheet สำเร็จเรียบร้อย!"; 
        statusText.style.color = "#10b981";
    } catch (e) {
        statusText.innerHTML = "❌ เกิดข้อผิดพลาดทางเทคนิคในการบันทึกคะแนน"; 
        statusText.style.color = "#ef4444";
    } finally { retryBtn.disabled = false; }
}

function goToMain() { location.href = "../main.html"; }
</script>

</html>
